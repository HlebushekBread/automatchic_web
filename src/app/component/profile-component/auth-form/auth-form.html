<div class="auth-card">
  <form [formGroup]="loginForm" class="auth-form">
    <div class="form-group">
      <label class="form-label" for="username">Логин (почта)</label>
      <input
        class="form-input"
        id="username"
        type="text"
        formControlName="username"
        placeholder="example@mail.com"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Пароль (6 или более символов)</label>
      <input
        class="form-input"
        id="password"
        type="password"
        formControlName="password"
        placeholder="••••••••"
      />
    </div>

    @if (isRegisterMode()) {
      <div class="form-group">
        <label class="form-label" for="fullName">Имя (необяз.)</label>
        <input
          class="form-input"
          id="fullName"
          type="text"
          formControlName="fullName"
          placeholder="Джеффри Эпштейн"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="group">Группа (необяз.)</label>
        <input
          class="form-input"
          id="group"
          type="text"
          formControlName="group"
          placeholder="БИТВ-23-СП-1"
        />
      </div>

      <button
        type="button"
        class="submit-btn"
        [disabled]="loginForm.invalid"
        (click)="onRegister()"
      >
        Зарегистрироваться
      </button>
    } @else {
      <button class="submit-btn" type="button" [disabled]="loginForm.invalid" (click)="onLogin()">
        Войти
      </button>
    }

    @if (errorMessage()) {
      <div class="error">{{ errorMessage() }}</div>
      <button
        class="submit-btn forgot"
        type="button"
        [disabled]="isResetDisabled()"
        (click)="onForgotPassword()"
      >
        Забыли пароль?<br /><br />
        @if (warningMessage()) {
          <b>{{ warningMessage() }}</b>
        }
      </button>
    }
    <span class="mid-span">Или</span>
    <button
      class="submit-btn switch"
      type="button"
      (click)="isRegisterMode.set(!isRegisterMode()); errorMessage.set('')"
    >
      {{ isRegisterMode() ? 'Вход' : 'Регистрация' }}
    </button>
  </form>
</div>
